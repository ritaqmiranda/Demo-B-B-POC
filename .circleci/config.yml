version: 2.1

executors:
  node-browser:
    docker:
      - image: mcr.microsoft.com/playwright:v1.61.1-jammy
    working_directory: ~/project

  k6:
    docker:
      - image: grafana/k6:0.53.0
    working_directory: ~/project

commands:
  install_dependencies:
    steps:
      - checkout
      - restore_cache:
          keys:
            - npm-v1-{{ checksum "package-lock.json" }}
            - npm-v1-
      - run:
          name: Install dependencies
          command: npm ci
      - save_cache:
          key: npm-v1-{{ checksum "package-lock.json" }}
          paths:
            - ~/.npm

  publish_playwright_artifacts:
    steps:
      - store_test_results:
          path: test-results
      - store_artifacts:
          path: playwright-report
          destination: playwright-report
      - store_artifacts:
          path: test-results
          destination: test-results

jobs:
  lint:
    executor: node-browser
    steps:
      - install_dependencies
      - run:
          name: Lint
          command: npm run lint

  unit_tests:
    executor: node-browser
    steps:
      - install_dependencies
      - run:
          name: Unit Tests
          command: npm run test:unit

  smoke_tests:
    executor: node-browser
    steps:
      - install_dependencies
      - run:
          name: Smoke Tests
          command: npm run test:smoke
      - publish_playwright_artifacts

  contract_tests:
    executor: node-browser
    steps:
      - install_dependencies
      - run:
          name: Contract Tests
          command: npm run test:contract
      - store_artifacts:
          path: pacts
          destination: pacts

  ui_tests:
    executor: node-browser
    steps:
      - install_dependencies
      - run:
          name: UI Tests
          command: npm run test:ui
      - publish_playwright_artifacts

  e2e_tests:
    executor: node-browser
    steps:
      - install_dependencies
      - run:
          name: E2E Tests
          command: npm run test:e2e
      - publish_playwright_artifacts

  accessibility_tests:
    executor: node-browser
    steps:
      - install_dependencies
      - run:
          name: Accessibility Tests
          command: npm run test:a11y
      - publish_playwright_artifacts

  k6_performance_smoke:
    executor: k6
    steps:
      - checkout
      - run:
          name: k6 Performance Smoke
          command: k6 run tests/non-functional/performance/k6/availability-smoke.js

workflows:
  test_pipeline:
    jobs:
      - lint
      - unit_tests
      - smoke_tests:
          requires:
            - lint
            - unit_tests
      - contract_tests:
          requires:
            - lint
            - unit_tests
      - ui_tests:
          requires:
            - smoke_tests
      - e2e_tests:
          requires:
            - smoke_tests
      - accessibility_tests:
          requires:
            - smoke_tests
